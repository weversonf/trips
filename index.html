<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Plan: Expocrato Noir</title>
    <style>
        :root {
            --bg: #0f0f12;
            --card: rgba(28, 28, 35, 0.7);
            --accent-purple: #c729f2;
            --accent-blue: #0ae6f2;
            --accent-orange: #f28705;
            --text-p: #9a9a9f;
            --text-h: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-h);
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 400px; /* Estilo Celular/SaaS App */
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .glass-card {
            background: var(--card);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .header { display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header p { font-size: 12px; color: var(--text-p); }

        /* Gráfico de Rosca (SVG) */
        .chart-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            position: relative;
        }

        .chart-info {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .chart-info span { display: block; color: var(--text-p); font-size: 10px; text-transform: uppercase; }
        .chart-info b { font-size: 22px; }

        /* Grid de Valores */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-item { padding: 15px; border-radius: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); }
        .stat-item h4 { font-size: 10px; color: var(--text-p); text-transform: uppercase; margin-bottom: 5px; }
        .stat-item p { font-size: 16px; font-weight: 600; }

        /* Lista de Itens */
        .item-list { display: flex; flex-direction: column; gap: 15px; margin-top: 10px; }
        .item { display: flex; justify-content: space-between; align-items: center; }
        .item-left { display: flex; gap: 12px; align-items: center; }
        .icon-box { width: 40px; height: 40px; border-radius: 12px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .item-info b { font-size: 14px; display: block; }
        .item-info span { font-size: 11px; color: var(--text-p); }
        .item-price { font-weight: 600; font-size: 14px; }

        .btn-main {
            background: linear-gradient(135deg, var(--accent-orange), #d35400);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(242, 135, 5, 0.2);
        }

        /* Manchas de luz ao fundo (efeito da imagem) */
        .glow {
            position: absolute;
            width: 100px; height: 100px;
            filter: blur(50px);
            opacity: 0.3;
            z-index: -1;
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="glass-card header">
        <div>
            <h1>Expocrato 2026</h1>
            <p>Fazer 250 • 11/07 a 13/07</p>
        </div>
        <div style="text-align: right">
            <span style="font-size: 20px;">🛡️</span>
        </div>
    </div>

    <div class="glass-card">
        <div class="glow" style="background: var(--accent-purple); top: -20px; right: -20px;"></div>
        <div class="chart-container">
            <svg width="160" height="160">
                <circle cx="80" cy="80" r="70" fill="none" stroke="#222" stroke-width="12" />
                <circle cx="80" cy="80" r="70" fill="none" stroke="var(--accent-orange)" stroke-width="12" stroke-dasharray="440" stroke-dashoffset="300" stroke-linecap="round" />
            </svg>
            <div class="chart-info">
                <span>Total Gasto</span>
                <b>R$ 865</b>
            </div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-item">
                <h4>Gasolina</h4>
                <p style="color: var(--accent-orange)">R$ 250</p>
            </div>
            <div class="stat-item">
                <h4>Hospedagem</h4>
                <p style="color: var(--accent-purple)">R$ 415</p>
            </div>
        </div>
    </div>

    <div class="glass-card">
        <h4 style="font-size: 12px; color: var(--text-p); margin-bottom: 20px; text-transform: uppercase;">Detalhamento</h4>
        <div class="item-list">
            <div class="item">
                <div class="item-left">
                    <div class="icon-box">⛽</div>
                    <div class="item-info">
                        <b>Combustível</b>
                        <span>1.020 km (29km/L)</span>
                    </div>
                </div>
                <div class="item-price">R$ 250</div>
            </div>
            <div class="item">
                <div class="item-left">
                    <div class="icon-box">🍲</div>
                    <div class="item-info">
                        <b>Alimentação</b>
                        <span>Almoço e Janta</span>
                    </div>
                </div>
                <div class="item-price">R$ 175</div>
            </div>
            <div class="item">
                <div class="item-left">
                    <div class="icon-box">💧</div>
                    <div class="item-info">
                        <b>Hidratação</b>
                        <span>Meta 3,5L/dia</span>
                    </div>
                </div>
                <div class="item-price">R$ 25</div>
            </div>
        </div>
    </div>

    <button class="btn-main" onclick="alert('Partiu Cariri! Cuida na fuga.')">Confirmar Roteiro</button>

</div>

</body>
</html>
