<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mu Trips SaaS v04</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --sidebar: #121217;
            --card: rgba(30, 30, 38, 0.6);
            --accent-purple: #c729f2;
            --accent-blue: #0ae6f2;
            --accent-orange: #f28705;
            --text-main: #f0f0f5;
            --text-dim: #71717a;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); overflow-x: hidden; }

        /* --- LAYOUT ESTRUTURAL --- */
        .app-shell {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar - Oculta no mobile */
        .sidebar {
            width: 280px;
            background: var(--sidebar);
            border-right: 1px solid var(--glass-border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* --- COMPONENTES --- */
        .glass-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
        }

        /* Grid de Dashboards Desktop */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .trip-selector {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .trip-option {
            padding: 15px;
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .trip-option:hover { background: rgba(255,255,255,0.08); }
        .trip-option.active {
            border-color: var(--accent-orange);
            background: rgba(242, 135, 5, 0.1);
        }

        .kpi-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .kpi-card { text-align: left; }
        .kpi-card span { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .kpi-card h2 { font-size: 24px; margin-top: 5px; color: var(--text-main); }

        /* Lista Detalhada */
        .detail-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .detail-table th { text-align: left; padding: 12px; color: var(--text-dim); font-size: 12px; border-bottom: 1px solid var(--glass-border); }
        .detail-table td { padding: 16px 12px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.02); }

        /* --- RESPONSIVIDADE (MOBILE) --- */
        @media (max-width: 850px) {
            .sidebar { display: none; } /* Esconde sidebar no mobile */
            .main-content { padding: 20px; }
            .dashboard-grid { grid-template-columns: 1fr; }
            .kpi-row { grid-template-columns: 1fr; }
            
            .header-mobile {
                display: block;
                margin-bottom: 20px;
            }
            
            /* Filtro horizontal estilo chip no mobile */
            .mobile-filter {
                display: flex;
                overflow-x: auto;
                gap: 10px;
                padding-bottom: 15px;
                scrollbar-width: none;
            }
        }

        @media (min-width: 851px) {
            .mobile-filter { display: none; }
            .header-mobile { display: none; }
        }

        /* Animação de entrada */
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    </style>
</head>
<body>

<div class="app-shell">
    <aside class="sidebar">
        <div class="logo">
            <h2 style="color: var(--accent-orange); letter-spacing: -1px;">MU <span style="color: #fff;">TRIPS</span></h2>
        </div>
        <nav class="trip-selector">
            <p style="font-size: 11px; color: var(--text-dim); margin-bottom: 10px;">HISTÓRICO & PLANOS</p>
            <div id="sidebar-list">
                </div>
        </nav>
    </aside>

    <main class="main-content">
        
        <header class="header-mobile">
            <h2 style="margin-bottom: 15px;">Minhas Viagens</h2>
            <div class="mobile-filter" id="mobile-filter-list">
                </div>
        </header>

        <div id="trip-content" class="fade-in">
            
            <div class="kpi-row">
                <div class="glass-card kpi-card">
                    <span>Investimento Total</span>
                    <h2 id="total-val" style="color: var(--accent-orange);">R$ 0</h2>
                </div>
                <div class="glass-card kpi-card">
                    <span>Transporte / Gasolina</span>
                    <h2 id="fuel-val">R$ 0</h2>
                </div>
                <div class="glass-card kpi-card">
                    <span>Estadia / Hospedagem</span>
                    <h2 id="stay-val">R$ 0</h2>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="glass-card">
                    <h3 style="font-size: 16px; margin-bottom: 20px;">Relatório Detalhado</h3>
                    <table class="detail-table">
                        <thead>
                            <tr>
                                <th>CATEGORIA</th>
                                <th>DESCRIÇÃO</th>
                                <th>VALOR</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            </tbody>
                    </table>
                </div>

                <div class="glass-card">
                    <h3 style="font-size: 16px; margin-bottom: 15px;">Contexto da Trip</h3>
                    <p id="trip-desc" style="color: var(--text-dim); font-size: 14px; line-height: 1.6;">
                        Selecione uma viagem para ver as notas e informações de logística.
                    </p>
                    <div id="extra-info" style="margin-top: 20px; border-top: 1px solid var(--glass-border); padding-top: 15px;">
                        </div>
                </div>
            </div>

        </div>
    </main>
</div>

<script>
    const tripsData = [
        {
            id: 'expocrato',
            name: 'Expocrato 2026',
            total: '865,00',
            fuel: '250,00',
            stay: '415,00',
            desc: 'Viagem solo de Fortaleza para o Crato. Foco nos shows de domingo (Capital Inicial e Jota Quest). Rodagem direta via BR-116/CE-060.',
            info: '🏍️ 1.020 km totais | 💧 Meta 3.5L/dia',
            details: [
                { cat: 'Combustível', item: 'Gasolina (29km/L)', val: '250,00' },
                { cat: 'Hospedagem', item: 'Crato (Sáb-Seg)', val: '415,00' },
                { cat: 'Alimentação', item: 'Refeições + Lanches', val: '175,00' },
                { cat: 'Suporte', item: 'Hidratação Especial', val: '25,00' }
            ]
        },
        {
            id: 'chile',
            name: 'Chile (2027)',
            total: '12.500,00',
            fuel: '3.500,00',
            stay: '4.500,00',
            desc: 'Expedição para o frio. Roteiro focado em Punta Arenas e Torres del Paine no final do ano.',
            info: '❄️ Clima Extremo | ✈️ Aéreo incluso',
            details: [
                { cat: 'Transporte', item: 'Aéreo For/Chile (Ida/Volta)', val: '3.500,00' },
                { cat: 'Estadia', item: 'Hotéis 10 Noites', val: '4.500,00' },
                { cat: 'Equipamento', item: 'Vestuário Térmico', val: '2.000,00' },
                { cat: 'Lazer', item: 'Passeios e Gastronomia', val: '2.500,00' }
            ]
        }
    ];

    function selectTrip(id) {
        const trip = tripsData.find(t => t.id === id);
        
        // Atualiza KPIs com animação
        document.getElementById('total-val').innerText = `R$ ${trip.total}`;
        document.getElementById('fuel-val').innerText = `R$ ${trip.fuel}`;
        document.getElementById('stay-val').innerText = `R$ ${trip.stay}`;
        document.getElementById('trip-desc').innerText = trip.desc;
        document.getElementById('extra-info').innerHTML = `<span style="font-size: 12px; color: var(--accent-blue);">${trip.info}</span>`;

        // Atualiza Tabela
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = trip.details.map(d => `
            <tr>
                <td style="color: var(--accent-purple); font-weight: 600;">${d.cat}</td>
                <td>${d.item}</td>
                <td style="text-align: right; font-weight: bold;">R$ ${d.val}</td>
            </tr>
        `).join('');

        // Sincroniza classes Ativas (Sidebar e Mobile)
        document.querySelectorAll('.trip-option, .chip').forEach(el => {
            el.classList.toggle('active', el.dataset.id === id);
        });

        // Trigger animação de fade
        const content = document.getElementById('trip-content');
        content.classList.remove('fade-in');
        void content.offsetWidth; // Force reflow
        content.classList.add('fade-in');
    }

    // Inicialização
    const sidebar = document.getElementById('sidebar-list');
    const mobileFilter = document.getElementById('mobile-filter-list');

    tripsData.forEach(trip => {
        // Sidebar (Desktop)
        const opt = document.createElement('div');
        opt.className = 'trip-option';
        opt.dataset.id = trip.id;
        opt.innerHTML = `<h4 style="font-size: 14px;">${trip.name}</h4><small style="color: var(--text-dim)">R$ ${trip.total}</small>`;
        opt.onclick = () => selectTrip(trip.id);
        sidebar.appendChild(opt);

        // Chips (Mobile)
        const chip = document.createElement('div');
        chip.className = 'chip trip-option'; // reaproveitando estilos básicos
        chip.style.padding = '8px 15px';
        chip.style.borderRadius = '20px';
        chip.style.fontSize = '12px';
        chip.style.whiteSpace = 'nowrap';
        chip.dataset.id = trip.id;
        chip.innerText = trip.name;
        chip.onclick = () => selectTrip(trip.id);
        mobileFilter.appendChild(chip);
    });

    // Iniciar com a primeira
    selectTrip(tripsData[0].id);
</script>

</body>
</html>
