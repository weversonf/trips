<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mu Trips v05</title>
    <style>
        :root {
            --bg-deep: #0b0a0f;
            --card-glass: rgba(22, 22, 28, 0.7);
            --accent-purple: #c729f2;
            --accent-blue: #0ae6f2;
            --accent-orange: #f28705;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { 
            background-color: var(--bg-deep); 
            color: var(--text-main);
            background-image: radial-gradient(circle at 0% 0%, rgba(199, 41, 242, 0.05) 0%, transparent 50%),
                              radial-gradient(circle at 100% 100%, rgba(10, 230, 242, 0.05) 0%, transparent 50%);
            min-height: 100vh;
        }

        .app-shell { display: flex; min-height: 100vh; }

        /* --- SIDEBAR VIBRANTE --- */
        .sidebar {
            width: 280px;
            background: rgba(15, 15, 20, 0.95);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-glass);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 35px;
            position: sticky;
            top: 0; height: 100vh;
        }

        .logo { font-size: 22px; font-weight: 800; letter-spacing: -1px; }
        .logo span { color: var(--accent-orange); }

        .trip-option {
            padding: 16px;
            border-radius: 16px;
            background: rgba(255,255,255,0.02);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
            margin-bottom: 12px;
        }

        .trip-option:hover { background: rgba(255,255,255,0.05); transform: translateX(5px); }
        .trip-option.active {
            background: linear-gradient(135deg, rgba(242, 135, 5, 0.15), rgba(242, 135, 5, 0.05));
            border-color: var(--accent-orange);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; padding: 40px; max-width: 1200px; margin: 0 auto; width: 100%; }

        .glass-card {
            background: var(--card-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Brilhos de fundo estilo a imagem original */
        .glow-spot {
            position: absolute; width: 150px; height: 150px;
            filter: blur(80px); opacity: 0.15; z-index: 0;
        }

        .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .kpi-card h2 { font-size: 32px; font-weight: 700; margin-top: 10px; }
        .label-mini { font-size: 11px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }

        .dashboard-grid { display: grid; grid-template-columns: 1.8fr 1fr; gap: 25px; }

        /* Tabela Estilo "Transaction" */
        .detail-table { width: 100%; border-collapse: collapse; position: relative; z-index: 1; }
        .detail-table th { text-align: left; padding: 15px; color: var(--text-dim); font-size: 11px; text-transform: uppercase; }
        .detail-table td { padding: 20px 15px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.03); }

        .icon-circle {
            width: 35px; height: 35px; border-radius: 50%;
            background: rgba(255,255,255,0.05);
            display: inline-flex; align-items: center; justify-content: center; margin-right: 12px;
        }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 900px) {
            .sidebar { display: none; }
            .dashboard-grid { grid-template-columns: 1fr; }
            .main-content { padding: 20px; }
            .mobile-nav { display: flex; overflow-x: auto; gap: 10px; margin-bottom: 20px; padding-bottom: 10px; }
            .mobile-nav::-webkit-scrollbar { display: none; }
        }

        @media (min-width: 901px) { .mobile-nav { display: none; } }

        .active-text-orange { color: var(--accent-orange); }
        .active-text-purple { color: var(--accent-purple); }
        .active-text-blue { color: var(--accent-blue); }

        /* Animação */
        .data-update { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="app-shell">
    <aside class="sidebar">
        <div class="logo">MU<span>TRIPS</span></div>
        <nav id="sidebar-menu"></nav>
    </aside>

    <main class="main-content">
        <div class="mobile-nav" id="mobile-menu"></div>

        <div id="display-area" class="data-update">
            <div class="kpi-row">
                <div class="glass-card kpi-card">
                    <div class="glow-spot" style="background: var(--accent-orange); top:-50px; left:-50px;"></div>
                    <span class="label-mini">Investimento Total</span>
                    <h2 id="kpi-total" class="active-text-orange">R$ 0</h2>
                </div>
                <div class="glass-card kpi-card">
                    <span class="label-mini">Transporte</span>
                    <h2 id="kpi-fuel">R$ 0</h2>
                </div>
                <div class="glass-card kpi-card">
                    <span class="label-mini">Hospedagem</span>
                    <h2 id="kpi-stay" class="active-text-purple">R$ 0</h2>
                </div>
            </div>

            <div class="dashboard-grid">
                <div class="glass-card">
                    <div class="glow-spot" style="background: var(--accent-blue); bottom:-50px; right:-50px; opacity: 0.1;"></div>
                    <h3 style="margin-bottom: 25px; font-size: 18px;">Relatório de Gastos</h3>
                    <table class="detail-table">
                        <tbody id="table-data"></tbody>
                    </table>
                </div>

                <div class="glass-card" style="display: flex; flex-direction: column; gap: 20px;">
                    <div>
                        <span class="label-mini">Resumo do Destino</span>
                        <p id="trip-desc" style="margin-top:15px; line-height: 1.6; color: var(--text-dim);"></p>
                    </div>
                    <div id="trip-meta" style="padding: 20px; border-radius: 16px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-glass);">
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const trips = [
        {
            id: 'expocrato',
            name: 'Expocrato 2026',
            total: '865,00', fuel: '250,00', stay: '415,00',
            desc: 'Foco no rock nacional (Jota Quest e Capital Inicial). Pilotagem direta Fortaleza-Crato via BR-116.',
            meta: '🏍️ Fazer 250 | 📍 1.020km | 💧 3.5L H2O',
            items: [
                { icon: '⛽', label: 'Gasolina', sub: '29km/L Média', val: '250,00', color: 'orange' },
                { icon: '🏨', label: 'Hospedagem', sub: '2 Noites Crato', val: '415,00', color: 'purple' },
                { icon: '🍛', label: 'Alimentação', sub: '3 Dias / Refeições', val: '200,00', color: 'blue' }
            ]
        },
        {
            id: 'chile',
            name: 'Chile (2027)',
            total: '12.500,00', fuel: '3.500,00', stay: '4.500,00',
            desc: 'Expedição para Punta Arenas e Torres del Paine. Planejamento de 10 dias no extremo sul.',
            meta: '❄️ Inverno Chileno | ✈️ Aéreo LATAM',
            items: [
                { icon: '✈️', label: 'Passagens', sub: 'FOR > SCL > PUQ', val: '3.500,00', color: 'blue' },
                { icon: '🏔️', label: 'Hotéis', sub: 'Punta Arenas', val: '4.500,00', color: 'purple' },
                { icon: '🧥', label: 'Equipamento', sub: 'Vestuário Térmico', val: '2.000,00', color: 'orange' }
            ]
        }
    ];

    function render(id) {
        const trip = trips.find(t => t.id === id);
        document.getElementById('kpi-total').innerText = `R$ ${trip.total}`;
        document.getElementById('kpi-fuel').innerText = `R$ ${trip.fuel}`;
        document.getElementById('kpi-stay').innerText = `R$ ${trip.stay}`;
        document.getElementById('trip-desc').innerText = trip.desc;
        document.getElementById('trip-meta').innerText = trip.meta;

        const table = document.getElementById('table-data');
        table.innerHTML = trip.items.map(i => `
            <tr>
                <td style="width: 50px;"><div class="icon-circle">${i.icon}</div></td>
                <td>
                    <div style="font-weight: 600;">${i.label}</div>
                    <div style="font-size: 11px; color: var(--text-dim);">${i.sub}</div>
                </td>
                <td style="text-align: right; font-weight: 700; color: var(--accent-${i.color});">R$ ${i.val}</td>
            </tr>
        `).join('');

        document.querySelectorAll('.trip-option').forEach(el => el.classList.toggle('active', el.dataset.id === id));
        
        const area = document.getElementById('display-area');
        area.classList.remove('data-update');
        void area.offsetWidth;
        area.classList.add('data-update');
    }

    const menu = document.getElementById('sidebar-menu');
    const mMenu = document.getElementById('mobile-menu');

    trips.forEach(t => {
        const btn = document.createElement('div');
        btn.className = 'trip-option';
        btn.dataset.id = t.id;
        btn.innerHTML = `<div class="label-mini" style="color:var(--text-main)">${t.name}</div><div style="font-size:12px; color:var(--text-dim)">R$ ${t.total}</div>`;
        btn.onclick = () => render(t.id);
        menu.appendChild(btn);

        const mBtn = btn.cloneNode(true);
        mBtn.style.minWidth = '160px';
        mBtn.onclick = () => render(t.id);
        mMenu.appendChild(mBtn);
    });

    render(trips[0].id);
</script>
</body>
</html>
